# Application Configuration
spring.application.name=backend
server.port=8080

# Thread Configuration
queens.solver.thread-count=4

# Solver Configuration
queens.board.size=16
queens.solver.solution-limit=500

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# LOGGING
# ============================================

logging.level.com.knightstour=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# FLYWAY MIGRATIONS (Optional - for version control)
# ============================================

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173



# Algorithm timing configuration
algorithm.timing.base-scale=1.0
algorithm.timing.ek-factor=150.0
algorithm.timing.dinic-factor=800.0
algorithm.timing.dinic-speedup=3.0

# Logging
logging.level.com.pdsagame.backend.TrafficSimulation.service.GameService=DEBUG