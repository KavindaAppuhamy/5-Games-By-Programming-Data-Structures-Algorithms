# ============================================
# KNIGHT'S TOUR GAME - BACKEND CONFIGURATION
# ============================================

# Server Configuration
server.port=8082
spring.application.name=knights-tour-backend

# ============================================
# SUPABASE POSTGRESQL DATABASE CONFIGURATION
# ============================================

spring.datasource.url=jdbc:postgresql://db.xfgqzjpkylcrrstqnrik.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=wccr0h3Fx4mbKeas
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================

# Set to 'update' for first run (creates tables automatically)
# Change to 'validate' after tables are created
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# LOGGING
# ============================================

logging.level.com.knightstour=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# FLYWAY MIGRATIONS (Optional - for version control)
# ============================================

# Set to false initially, we'll use Hibernate auto-ddl
spring.flyway.enabled=false